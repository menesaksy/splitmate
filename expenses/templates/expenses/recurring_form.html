{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Tekrarlayan Harcama Ekle</h2>
  <p class="text-muted">Grup: <strong>{{ group.name }}</strong></p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Kaydet</button>
    <a href="{% url 'group_detail' group.pk %}" class="btn btn-secondary">İptal</a>
  </form>
</div>
{% endblock %}

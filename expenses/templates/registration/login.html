{% extends 'base.html' %}
{% block title %}Giriş · SplitMate{% endblock %}

{% block auth_content %}
<div class="form-card">
    <h4><i class="ti ti-login"></i> Giriş Yap</h4>
    {% if form.errors %}
    <div class="alert-toast alert-error mb-3">
        <i class="ti ti-alert-circle"></i> Kullanıcı adı veya şifre hatalı.
    </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label style="display:block; font-size:12px; font-weight:500; color:var(--text-secondary); margin-bottom:5px;">Kullanıcı Adı</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label style="display:block; font-size:12px; font-weight:500; color:var(--text-secondary); margin-bottom:5px;">Şifre</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-sm-primary w-100 justify-content-center mt-2">
            <i class="ti ti-login"></i> Giriş Yap
        </button>
    </form>
    <p style="text-align:center; margin-top:16px; font-size:13px; color:var(--text-muted);">
        Hesabın yok mu? <a href="{% url 'signup' %}" style="color:var(--accent);">Kayıt ol</a>
    </p>
</div>
{% endblock %}

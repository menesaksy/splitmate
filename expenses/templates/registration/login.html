{% extends 'base.html' %}
{% block title %}Giriş · SplitMate{% endblock %}

{% block auth_content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card summary-card">
            <div class="card-body p-4">
                <h4 class="mb-3"><i class="bi bi-box-arrow-in-right"></i> Giriş Yap</h4>
                {% if form.errors %}
                <div class="alert alert-danger">Kullanıcı adı veya şifre hatalı.</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Kullanıcı Adı</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Şifre</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                </form>
                <p class="text-center mt-3 small">
                    Hesabın yok mu? <a href="{% url 'signup' %}">Kayıt ol</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
